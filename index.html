<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>루다쌤의 AAC maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        .group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1557b0; }
        #status { margin-top: 15px; text-align: center; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎨 AAC 그림카드 인쇄 도구</h2>
    
    <div class="group">
        <label>1. 정사각형 크기 선택</label>
        <select id="size">
            <option value="50">50mm (큰 크기)</option>
            <option value="45" selected>45mm (표준)</option>
            <option value="40">40mm (작은 크기)</option>
        </select>
    </div>

    <div class="group">
        <label>2. 이미지 선택 (여러 장 가능)</label>
        <input type="file" id="images" accept="image/*" multiple>
    </div>

    <button onclick="generatePDF()">PDF 생성 및 저장</button>
    <div id="status">파일을 넣고 버튼을 누르면 다운로드됩니다.</div>
</div>

<script>
    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const fileInput = document.getElementById('images');
        const sizeMm = parseInt(document.getElementById('size').value);
        const status = document.getElementById('status');
        
        if (fileInput.files.length === 0) {
            alert("이미지를 먼저 선택해 주세요!");
            return;
        }

        status.innerText = "PDF 생성 중...";
        const doc = new jsPDF('p', 'mm', 'a4'); // A4 사이즈 설정
        
        const margin = 10;   // 테두리 여백
        const spacing = 2;  // 이미지 간격
        const startX = margin;
        const startY = margin;
        
        let currentX = startX;
        let currentY = startY;

        for (let i = 0; i < fileInput.files.length; i++) {
            const file = fileInput.files[i];
            const imgData = await readFileAsDataURL(file);
            
            // 이미지 그리기
            doc.addImage(imgData, 'JPEG', currentX, currentY, sizeMm, sizeMm);
            
            // 다음 위치 계산
            currentX += sizeMm + spacing;
            
            // 가로 줄 바꿈 (210mm 기준 여백 빼고 남은 공간 체크)
            if (currentX + sizeMm > 210 - margin) {
                currentX = startX;
                currentY += sizeMm + spacing;
            }
            
            // 세로 페이지 바꿈 (297mm 기준)
            if (currentY + sizeMm > 297 - margin && i < fileInput.files.length - 1) {
                doc.addPage();
                currentX = startX;
                currentY = startY;
            }
        }

        doc.save(`AACmaker_${sizeMm}mm.pdf`);
        status.innerText = "저장 완료!";
    }

    function readFileAsDataURL(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsDataURL(file);
        });
    }
</script>

</body>
</html>
